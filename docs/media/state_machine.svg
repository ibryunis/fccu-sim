<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 460" font-family="Segoe UI, sans-serif">
  <defs>
    <marker id="m" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#8b949e"/>
    </marker>
    <marker id="r" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#f85149"/>
    </marker>
  </defs>
  <rect width="960" height="460" fill="#0d1117"/>
  <text x="480" y="32" fill="#e6edf3" font-size="18" text-anchor="middle" font-weight="600">FCCU state machine - startup sequencing and latched shutdown</text>

  <!-- main chain -->
  <g font-size="13" font-weight="600" text-anchor="middle">
    <rect x="40"  y="120" width="110" height="46" rx="8" fill="#161b22" stroke="#8b949e" stroke-width="1.5"/>
    <text x="95" y="148" fill="#e6edf3">OFF</text>
    <rect x="205" y="120" width="110" height="46" rx="8" fill="#161b22" stroke="#58a6ff" stroke-width="1.5"/>
    <text x="260" y="148" fill="#e6edf3">PURGE</text>
    <rect x="370" y="120" width="130" height="46" rx="8" fill="#161b22" stroke="#58a6ff" stroke-width="1.5"/>
    <text x="435" y="148" fill="#e6edf3">PRESSURIZE</text>
    <rect x="555" y="120" width="110" height="46" rx="8" fill="#161b22" stroke="#58a6ff" stroke-width="1.5"/>
    <text x="610" y="148" fill="#e6edf3">WARMUP</text>
    <rect x="720" y="120" width="120" height="46" rx="8" fill="#161b22" stroke="#3fb950" stroke-width="2"/>
    <text x="780" y="148" fill="#3fb950">RUNNING</text>
    <rect x="555" y="250" width="130" height="46" rx="8" fill="#161b22" stroke="#8b949e" stroke-width="1.5"/>
    <text x="620" y="278" fill="#e6edf3">SHUTDOWN</text>
    <rect x="150" y="330" width="130" height="52" rx="8" fill="#2d1416" stroke="#f85149" stroke-width="2"/>
    <text x="215" y="361" fill="#f85149">FAULT</text>
  </g>

  <!-- transitions -->
  <g stroke="#8b949e" stroke-width="1.8" fill="none">
    <line x1="150" y1="143" x2="203" y2="143" marker-end="url(#m)"/>
    <line x1="315" y1="143" x2="368" y2="143" marker-end="url(#m)"/>
    <line x1="500" y1="143" x2="553" y2="143" marker-end="url(#m)"/>
    <line x1="665" y1="143" x2="718" y2="143" marker-end="url(#m)"/>
    <line x1="780" y1="166" x2="687" y2="252" marker-end="url(#m)"/>
    <path d="M 555 273 L 95 273 L 95 168" marker-end="url(#m)"/>
  </g>
  <g fill="#8b949e" font-size="10" text-anchor="middle">
    <text x="176" y="132">START</text>
    <text x="341" y="120">t &gt;= 2 s</text>
    <text x="341" y="133">(air displaced)</text>
    <text x="527" y="120">p &gt;= 1.8 bar</text>
    <text x="527" y="133">timeout 10 s -&gt; FAULT</text>
    <text x="692" y="120">T &gt;= 35 degC</text>
    <text x="692" y="133">timeout 120 s -&gt; FAULT</text>
    <text x="762" y="215">STOP</text>
    <text x="320" y="263">t &gt;= 3 s (vented, de-energized)</text>
  </g>

  <!-- fault entries -->
  <g stroke="#f85149" stroke-width="1.6" fill="none" stroke-dasharray="5,4">
    <path d="M 260 166 L 215 328" marker-end="url(#r)"/>
    <path d="M 435 166 L 240 330" marker-end="url(#r)"/>
    <path d="M 610 166 L 265 332" marker-end="url(#r)"/>
    <path d="M 780 166 Q 700 360 282 356" marker-end="url(#r)"/>
  </g>
  <text x="450" y="318" fill="#f85149" font-size="11" text-anchor="middle">safety latch from ANY state: overpressure / overtemp / overcurrent /</text>
  <text x="450" y="333" fill="#f85149" font-size="11" text-anchor="middle">undervoltage / sensor implausible / sensor stuck / startup timeout</text>

  <!-- fault exit -->
  <path d="M 150 356 Q 60 356 60 200 Q 60 166 88 166" stroke="#8b949e" stroke-width="1.8" fill="none" stroke-dasharray="2,3" marker-end="url(#m)"/>
  <text x="52" y="250" fill="#8b949e" font-size="10" text-anchor="middle" transform="rotate(-90 52 250)">manual RESET, accepted only after cause clears</text>

  <!-- annotations -->
  <text x="480" y="425" fill="#8b949e" font-size="11" text-anchor="middle">Latch behavior mirrors the Formula Student shutdown circuit: de-energized is the safe state, hydrogen is cut on entry to FAULT,</text>
  <text x="480" y="442" fill="#8b949e" font-size="11" text-anchor="middle">and the latch survives the fault condition clearing - a human must re-arm, and only once every persistence accumulator has drained.</text>
</svg>
