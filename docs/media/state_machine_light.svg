<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 440" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <marker id="m" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#444444"/>
    </marker>
    <marker id="r" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#c62828"/>
    </marker>
  </defs>
  <rect width="1000" height="440" fill="#ffffff"/>
  <text x="500" y="34" fill="#000000" font-size="18" text-anchor="middle" font-weight="bold">FCCU state machine</text>
  <text x="500" y="54" fill="#555555" font-size="12" text-anchor="middle">startup sequenced by guards, shutdown latched by the safety circuit</text>

  <!-- return path SHUTDOWN -> OFF along the top -->
  <path d="M 905 118 L 905 92 L 95 92 L 95 118" stroke="#444444" stroke-width="1.3" fill="none" marker-end="url(#m)"/>
  <rect x="380" y="80" width="240" height="17" fill="#ffffff"/>
  <text x="500" y="92" fill="#555555" font-size="10.5" text-anchor="middle">t &#8805; 3 s &#183; anode vented, load off</text>

  <!-- main chain -->
  <g font-size="13" font-weight="bold" text-anchor="middle">
    <rect x="30"  y="120" width="130" height="46" rx="3" fill="#ffffff" stroke="#444444" stroke-width="1.3"/>
    <text x="95"  y="148" fill="#000000">OFF</text>
    <rect x="192" y="120" width="130" height="46" rx="3" fill="#ffffff" stroke="#444444" stroke-width="1.3"/>
    <text x="257" y="148" fill="#000000">PURGE</text>
    <rect x="354" y="120" width="130" height="46" rx="3" fill="#ffffff" stroke="#444444" stroke-width="1.3"/>
    <text x="419" y="148" fill="#000000">PRESSURIZE</text>
    <rect x="516" y="120" width="130" height="46" rx="3" fill="#ffffff" stroke="#444444" stroke-width="1.3"/>
    <text x="581" y="148" fill="#000000">WARMUP</text>
    <rect x="678" y="120" width="130" height="46" rx="3" fill="#eef4ea" stroke="#2e7d32" stroke-width="1.6"/>
    <text x="743" y="148" fill="#2e7d32">RUNNING</text>
    <rect x="840" y="120" width="130" height="46" rx="3" fill="#ffffff" stroke="#444444" stroke-width="1.3"/>
    <text x="905" y="148" fill="#000000">SHUTDOWN</text>
  </g>

  <!-- chain arrows -->
  <g stroke="#444444" stroke-width="1.3">
    <line x1="160" y1="143" x2="190" y2="143" marker-end="url(#m)"/>
    <line x1="322" y1="143" x2="352" y2="143" marker-end="url(#m)"/>
    <line x1="484" y1="143" x2="514" y2="143" marker-end="url(#m)"/>
    <line x1="646" y1="143" x2="676" y2="143" marker-end="url(#m)"/>
    <line x1="808" y1="143" x2="838" y2="143" marker-end="url(#m)"/>
  </g>

  <!-- guard labels -->
  <g fill="#333333" font-size="10.5" text-anchor="middle">
    <text x="175" y="185">START</text>
    <text x="337" y="185">t &#8805; 2 s</text>
    <text x="337" y="199">air displaced</text>
    <text x="499" y="185">p &#8805; 1.8 bar</text>
    <text x="499" y="199">timeout 10 s</text>
    <text x="661" y="185">T &#8805; 35 &#176;C</text>
    <text x="661" y="199">timeout 120 s</text>
    <text x="823" y="185">STOP</text>
  </g>

  <!-- fault bus -->
  <g stroke="#c62828" stroke-width="1.2" stroke-dasharray="6,4" fill="none">
    <line x1="257" y1="166" x2="257" y2="330"/>
    <line x1="419" y1="166" x2="419" y2="330"/>
    <line x1="581" y1="166" x2="581" y2="330"/>
    <line x1="743" y1="166" x2="743" y2="330"/>
    <line x1="905" y1="166" x2="905" y2="330"/>
    <line x1="257" y1="330" x2="905" y2="330"/>
    <line x1="500" y1="330" x2="500" y2="356" stroke-dasharray="none" marker-end="url(#r)"/>
  </g>
  <rect x="290" y="220" width="420" height="34" fill="#ffffff"/>
  <text x="500" y="234" fill="#c62828" font-size="10.5" text-anchor="middle" font-weight="bold">safety latch from any state</text>
  <text x="500" y="248" fill="#555555" font-size="10" text-anchor="middle">overpressure &#183; overtemp &#183; overcurrent &#183; undervoltage &#183; sensor implausible / stuck &#183; startup timeout</text>

  <!-- FAULT box -->
  <rect x="410" y="358" width="180" height="52" rx="3" fill="#fdecea" stroke="#c62828" stroke-width="1.6"/>
  <text x="500" y="381" fill="#c62828" font-size="14" font-weight="bold" text-anchor="middle">FAULT</text>
  <text x="500" y="398" fill="#555555" font-size="10" text-anchor="middle">hydrogen cut &#183; cooling 100 % &#183; latched</text>

  <!-- reset path -->
  <path d="M 410 384 L 95 384 L 95 168" stroke="#444444" stroke-width="1.3" fill="none" stroke-dasharray="2,3" marker-end="url(#m)"/>
  <rect x="130" y="392" width="250" height="17" fill="#ffffff"/>
  <text x="255" y="404" fill="#555555" font-size="10.5" text-anchor="middle">manual RESET &#183; only after cause clears</text>
</svg>
